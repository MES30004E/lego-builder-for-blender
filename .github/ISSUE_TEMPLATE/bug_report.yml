name: Bug Report
description: Report a reproducible problem in LEGO Builder for Blender.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for someone else to reproduce it.
  - type: input
    id: blender-version
    attributes:
      label: Blender version
      description: "Example: 5.1.2"
      placeholder: "5.1.2"
    validations:
      required: true
  - type: input
    id: addon-version
    attributes:
      label: LEGO Builder for Blender version
      description: Use a release, tag, or commit hash.
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Install the extension
        2. Open Blender
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add console output, screenshots, or tracebacks if available.
      render: text
