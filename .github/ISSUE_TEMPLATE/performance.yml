name: Performance
description: Report a performance concern or scalability risk.
title: "[Performance]: "
labels: ["performance"]
body:
  - type: markdown
    attributes:
      value: |
        Performance reports should include scale, expected behavior, and observed behavior.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Startup
        - Library Management
        - Part Browser
        - Asset Caching
        - Placement or Snapping
        - Scene Optimisation
        - Rendering
        - Export
        - Other
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: What workflow or scene size exposes the issue?
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: Include timing, scene size, memory use, or other measurements if available.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Blender version, operating system, hardware, and extension version.
