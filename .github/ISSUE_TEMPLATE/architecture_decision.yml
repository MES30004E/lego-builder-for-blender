name: Architecture Decision
description: Propose a decision that may need an ADR.
title: "[ADR]: "
labels: ["architecture"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for decisions that affect architecture, supported platforms, data concepts, or long-term maintenance.
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What problem, constraint, or tradeoff requires a decision?
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Proposed decision
      description: What should the project decide?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What other options were considered?
    validations:
      required: true
  - type: textarea
    id: consequences
    attributes:
      label: Consequences
      description: What tradeoffs, risks, or follow-up work would this create?
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Documents affected
      description: List docs that may need updates, such as ARCHITECTURE.md or DATA_MODEL.md.
